<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pluggy Quickstart Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <main></main>

    <!-- Biblioteca do widget -->
    <script src="https://cdn.pluggy.ai/pluggy-connect/v2.7.0/pluggy-connect.js"></script>

    <script>
      // Chama a função Serverless que gera o connectToken
      fetch('/api/connect-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ options: { clientUserId: 'demo@valoradar.com' } })
      })
        .then(r => r.json())
        .then(({ connectToken }) => {
          const pluggy = new PluggyConnect({
            connectToken,
            includeSandbox: false,
            onSuccess: d => console.log('✅ Sucesso!', d),
            onError:   e => console.error('❌ Erro:', e)
          });
          pluggy.init();
        })
        .catch(e => console.error('❌ Falha buscar token:', e));
    </script>
  </body>
</html>
